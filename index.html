<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bác sĩ Gấu - Chat Real-time</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        #header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .bot { background: #f1f0f0; color: #333; align-self: flex-start; }
        #input-area { border-top: 1px solid #ddd; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .loading { font-style: italic; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">🐻 Bác sĩ Gấu - Trung Sơn Care</div>
    <div id="messages">
        <div class="msg bot">Dạ, Bác sĩ Gấu xin nghe! Bạn cần hỏi về dịch vụ hay chính sách gì của Trung Sơn Care ạ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Hỏi Bác sĩ Gấu..." />
        <button id="sendBtn">Gửi</button>
    </div>
</div>

<script type="module">
    // CẤU HÌNH API
    const API_KEY = "AIzaSyCSjXNkoztRtYD1BQGj8NXpIivAjOvnyOk"; // Key bạn vừa lấy
    const MODEL_NAME = "gemini-1.5-flash"; // Bản nhanh nhất cho chatbot

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Hàm gửi tin nhắn
    async function askGemini() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        // Hiển thị tin người dùng
        appendMessage(prompt, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        // Hiển thị trạng thái đang chờ
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading';
        loadingDiv.innerText = 'Bác sĩ Gấu đang nhớ lại...';
        messagesDiv.appendChild(loadingDiv);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "contents": [{ "parts": [{ "text": prompt }] }],
                    "systemInstruction": { "parts": [{ "text": "Bạn là Bác sĩ Gấu của trungsoncare.com. Hãy trả lời thân thiện, lễ phép dùng 'Dạ'. Nếu hỏi về bệnh nặng hãy khuyên đi khám." }] }
                })
            });

            const data = await response.json();
            const botText = data.candidates[0].content.parts[0].text;
            
            loadingDiv.remove();
            appendMessage(botText, 'bot');

        } catch (error) {
            console.error("Lỗi:", error);
            loadingDiv.innerText = "Dạ, có lỗi kết nối chút xíu. Bạn thử lại nhé!";
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.onclick = askGemini;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') askGemini(); };
</script>

</body>
</html>
