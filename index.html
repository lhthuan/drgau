<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bác sĩ Gấu 🐻 - Trung Sơn Care</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 500px; height: 90vh; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #f0f2f5; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">🐻 Bác sĩ Gấu - Trung Sơn Care</div>
    <div id="messages">
        <div class="msg bot">Vâng, Bác sĩ Gấu xin nghe! Bác sĩ có thể giúp gì cho bạn về chính sách hay chi nhánh của Trung Sơn Care ạ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Nhập câu hỏi tại đây..." autocomplete="off">
        <button id="sendBtn">Gửi</button>
    </div>
</div>

<script>
    // Sử dụng API Key và Model từ Project của bạn
    const API_KEY = "AIzaSyCSjXNkoztRtYD1BQGj8NXpIivAjOvnyOk"; 
    const MODEL_ID = "gemini-2.5-flash"; 

    const SYSTEM_PROMPT = `Bạn là Bác sĩ Gấu, trợ lý ảo chính thức của hệ thống trungsoncare.com. 
Phong cách: Thân thiện, lễ phép, sử dụng 'Vâng', 'Xin chào', 'Bác sĩ Gấu xin nghe'.
Nhiệm vụ: Tư vấn chính sách thành viên, khuyến mãi, giao hàng, đổi trả và chi nhánh.
Nguyên tắc:
1. Chỉ trả lời dựa trên dữ liệu cung cấp. KHÔNG dùng internet.
2. Hỏi bệnh nặng: Trả lời 'Vâng, Bác sĩ Gấu đã nhận được thông tin từ bạn, tuy nhiên vấn đề của bạn có lẻ cần được tư vấn trực tiếp để rõ hơn, bạn hãy gọi hotline 1800558898 để gặp Bác sĩ Gấu nhé'.
3. Khi hỏi chi nhánh: BẮT BUỘC hỏi thêm Phường. Chỉ đưa hotline 1800558898.
4. Ngoài dữ liệu: Hướng dẫn gọi hotline 1800558898.`;

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function chat() {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        appendMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        const loadingMsg = appendMessage("Bác sĩ Gấu đang kiểm tra...", 'bot');

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "contents": [{ "role": "user", "parts": [{ "text": text }] }],
                    "systemInstruction": { "parts": [{ "text": SYSTEM_PROMPT }] },
                    "generationConfig": {
                        "temperature": 0.1, // Rất thấp để bám sát quy tắc
                        "topP": 0.95
                    }
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error ? data.error.message : "API Error");

            loadingMsg.innerText = data.candidates[0].content.parts[0].text;
        } catch (error) {
            loadingMsg.innerText = "Vâng, Bác sĩ Gấu đang bận một chút. Bạn vui lòng thử lại sau hoặc gọi hotline 1800558898 nhé!";
            console.error(error);
        } finally {
            sendBtn.disabled = false;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = "msg " + sender;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return div;
    }

    sendBtn.onclick = chat;
    userInput.addEventListener("keydown", (e) => { if (e.key === "Enter") chat(); });
</script>
</body>
</html>
