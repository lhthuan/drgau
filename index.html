<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build 4:44 Bác sĩ Gấu 🐻 - Trung Sơn Care</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 90vh; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .source { font-size: 11px; color: #007bff; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">🐻 Bác sĩ Gấu - Trung Sơn Care</div>
    <div id="messages">
        <div class="msg bot">Dạ, Bác sĩ Gấu xin nghe! Bác sĩ có thể giúp gì cho bạn về dịch vụ của Trung Sơn Care ạ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Nhập câu hỏi..." autocomplete="off">
        <button id="sendBtn">Gửi</button>
    </div>
</div>

<script>
    // Cấu hình từ Google AI Studio của bạn
    const API_KEY = "AIzaSyCSjXNkoztRtYD1BQGj8NXpIivAjOvnyOk"; 
    const MODEL_ID = "gemini-2.5-flash"; 

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function chatWithBacSiGau() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        const loadingMsg = appendMessage("Bác sĩ Gấu đang kiểm tra thông tin...", 'bot');

        try {
            // Sử dụng generateContent (thay vì stream để ổn định trên web đơn giản)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "contents": [{
                        "role": "user",
                        "parts": [{"text": text}]
                    }],
                    "systemInstruction": {
                        "parts": [{"text": "Bạn là Bác sĩ Gấu, trợ lý thông minh của Trung Sơn Care (trungsoncare.com). Hãy trả lời bằng tiếng Việt, phong cách lễ phép, nhẹ nhàng. Ưu tiên thông tin về dược phẩm, tiêm chủng và dịch vụ khách hàng."}]
                    },
                    "tools": [{ "googleSearch": {} }] // Kích hoạt Google Search như mẫu của bạn
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error ? data.error.message : "Lỗi không xác định");
            }

            // Lấy câu trả lời
            let answer = data.candidates[0].content.parts[0].text;
            
            // Xử lý hiển thị
            loadingMsg.innerText = answer;

        } catch (error) {
            loadingMsg.innerText = "⚠️ Dạ, Bác sĩ Gấu gặp lỗi: " + error.message;
            console.error("Lỗi chi tiết:", error);
        } finally {
            sendBtn.disabled = false;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return div;
    }

    sendBtn.onclick = chatWithBacSiGau;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') chatWithBacSiGau(); };
</script>

</body>
</html>
